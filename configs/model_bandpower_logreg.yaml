experiment:
  name: bandpower_logreg

data:
  input_file: data/processed/features_bandpower.csv
  target_column: label
  group_column: subject_id
  rejected_column: is_rejected
  metadata_columns:
    - subject_id
    - session_id
    - group
    - task
    - label
    - artifact_score
    - is_rejected

features:
  type: bandpower

normalization:
  scaler: robust

model:
  type: logistic_regression
  class_weight: balanced
  C: 1.0
  max_iter: 1000

validation:
  strategy: leave_one_subject_out
  group_column: subject_id
